<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokedex ptaków Polski</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="pokedex-shell">
    <header class="hero">
      <div class="hero-top">
        <span class="pokedex-label">PTAKI</span>
        <h1>Wyszponcone</h1>
        <p class="hero-subtitle">Ptakszponting Kacpra</p>
      </div>
      <a class="page-action-link" href="stats.html" title="Statystyki znalezionych ptaków" aria-label="Statystyki">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </a>
    </header>

    <div class="counter-display-top">
      <span id="birdCounter">0 / 0 znalezionych</span>
    </div>

    <main class="container">
    <section class="controls-panel">
      <div class="control-row">
        <div class="control-group search-group">
          <label for="searchInput">Szukaj nazwy:</label>
          <input id="searchInput" type="search" placeholder="np. jerzyk" />
        </div>
        <div class="control-group">
          <button id="advancedToggle" class="button-secondary">Zaawansowane wyszukiwanie</button>
        </div>
      </div>

      <div class="advanced-controls" aria-hidden="true">
        <div class="control-group">
          <label for="sortPrimary">Sortuj główne:</label>
          <select id="sortPrimary">
            <option value="polishName">Nazwa</option>
            <option value="family">Rodzina</option>
            <option value="rarity">Rzadkość</option>
          </select>
          <label for="sortPrimaryDir">Porządek:</label>
          <select id="sortPrimaryDir">
            <option value="asc">Rosnąco</option>
            <option value="desc">Malejąco</option>
          </select>
        </div>
        <div class="control-group">
          <label for="sortSecondary">Sortuj drugie:</label>
          <select id="sortSecondary">
            <option value="none">Brak</option>
            <option value="polishName">Nazwa</option>
            <option value="family">Rodzina</option>
            <option value="rarity">Rzadkość</option>
          </select>
          <label for="sortSecondaryDir">Porządek:</label>
          <select id="sortSecondaryDir">
            <option value="asc">Rosnąco</option>
            <option value="desc">Malejąco</option>
          </select>
        </div>
        <div class="control-group">
          <label for="filterFamily">Filtr rodziny:</label>
          <select id="filterFamily">
            <option value="all">Wszystkie</option>
          </select>
        </div>
        <div class="control-group">
          <label for="filterType">Filtr typu:</label>
          <select id="filterType">
            <option value="all">Wszystkie</option>
          </select>
        </div>
        <div class="control-group">
          <button id="resetButton" class="button-secondary">Resetuj stan znalezionych</button>
        </div>
      </div>
    </section>

    <section id="birdList" class="bird-grid" aria-live="polite"></section>
    <div class="load-more-wrapper">
      <button id="loadMoreButton" class="button-primary">Załaduj więcej</button>
    </div>
  </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
